<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroChat - Connect to the Future</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.3);
            --gloss: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 50%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1500622388414-8555a1042564?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* The Glass Container */
        #app-container {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Glossy Overlay Effect */
        #app-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: var(--gloss);
            pointer-events: none;
            z-index: 2;
        }

        header {
            padding: 15px;
            text-align: center;
            background: rgba(0, 120, 215, 0.5);
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.5) transparent;
        }

        .message {
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            border: 1px solid white;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease;
        }

        .message .username {
            font-size: 0.8rem;
            font-weight: bold;
            color: #0078d7;
            margin-bottom: 3px;
        }

        /* Input Area */
        #controls {
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.3);
            z-index: 10;
        }

        input {
            padding: 12px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.5);
            outline: none;
            background: rgba(255,255,255,0.9);
        }

        #username-input { width: 120px; }
        #message-input { flex: 1; }

        button {
            padding: 10px 25px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(180deg, #5ecfff 0%, #0078d7 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 120, 215, 0.3);
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>AERO CHAT v1.0</header>
    
    <div id="chat-window">
        <div class="message">
            <div class="username">System</div>
            Welcome to the digital horizon. Choose a name and start chatting!
        </div>
    </div>

    <div id="controls">
        <input type="text" id="username-input" placeholder="Display Name" value="User123">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const messageInput = document.getElementById('message-input');
    const usernameInput = document.getElementById('username-input');
    const sendBtn = document.getElementById('send-btn');

    function sendMessage() {
        const text = messageInput.value.trim();
        const user = usernameInput.value.trim() || "Anonymous";

        if (text !== "") {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `<div class="username">${user}</div><div>${text}</div>`;
            
            chatWindow.appendChild(msgDiv);
            messageInput.value = "";
            
            // Auto-scroll to bottom
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
